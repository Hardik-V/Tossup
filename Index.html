<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triple Toss-Up</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow+Condensed:wght@300;400;600&display=swap');

:root {
  --bg:#06060f;--surface:#0e0e20;--border:rgba(255,255,255,0.08);
  --gold:#f5c518;--gold2:#e8961a;--glow:rgba(245,197,24,0.35);
  --green:#22c55e;--tile-off:#111128;--tile-on:#1c1c42;--white:#f0eee8;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);font-family:'Barlow Condensed',sans-serif;color:var(--white);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 40% at 50% 0%,rgba(245,197,24,.06) 0%,transparent 70%),radial-gradient(ellipse 40% 60% at 0% 50%,rgba(59,130,246,.05) 0%,transparent 60%),radial-gradient(ellipse 40% 60% at 100% 50%,rgba(244,63,94,.05) 0%,transparent 60%);pointer-events:none;z-index:0;}

.view{display:none;position:relative;z-index:1;min-height:100vh;}
.view.active{display:flex;flex-direction:column;}

/* ═══ SETUP ═══ */
#setupView{align-items:center;justify-content:flex-start;padding:24px 16px 40px;}
.setup-card{background:var(--surface);border:1px solid rgba(245,197,24,.2);border-radius:20px;padding:30px 26px;width:100%;max-width:700px;box-shadow:0 0 60px rgba(0,0,0,.6),0 0 30px var(--glow);}
.logo{text-align:center;margin-bottom:22px;}
.logo-main{font-family:'Oswald',sans-serif;font-size:clamp(2rem,6vw,3.2rem);font-weight:700;letter-spacing:5px;background:linear-gradient(135deg,#fff 0%,var(--gold) 45%,var(--gold2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 14px var(--glow));}
.logo-sub{font-size:.68rem;letter-spacing:4px;color:rgba(245,197,24,.5);text-transform:uppercase;margin-top:3px;}
.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
@media(max-width:480px){.setup-grid{grid-template-columns:1fr;}}
.field{display:flex;flex-direction:column;gap:5px;}
.field.full{grid-column:1/-1;}
.field label{font-size:.62rem;letter-spacing:3px;text-transform:uppercase;color:rgba(245,197,24,.65);font-weight:600;}
.field input,.field select{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--white);font-family:'Barlow Condensed',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;}
.field input:focus,.field select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,197,24,.1);}
.field select option{background:#16162e;}
.sdiv{grid-column:1/-1;height:1px;background:var(--border);margin:2px 0;}
#teamNamesGrid{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:480px){#teamNamesGrid{grid-template-columns:1fr;}}
.pill-row{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--border);}
.pill-opt{flex:1;padding:9px 4px;text-align:center;cursor:pointer;font-size:.8rem;letter-spacing:1px;color:rgba(255,255,255,.45);transition:all .2s;border:none;background:transparent;font-family:'Barlow Condensed',sans-serif;}
.pill-opt.on{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#000;font-weight:600;}
#roundsList{grid-column:1/-1;display:flex;flex-direction:column;gap:5px;max-height:190px;overflow-y:auto;padding-right:3px;}
#roundsList::-webkit-scrollbar{width:4px;}
#roundsList::-webkit-scrollbar-thumb{background:rgba(245,197,24,.3);border-radius:2px;}
.round-entry{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:7px 11px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
.round-num{font-family:'Oswald',sans-serif;font-size:.95rem;color:var(--gold);min-width:20px;}
.round-info{flex:1;}
.round-phrase{font-size:.88rem;letter-spacing:1px;}
.round-meta{font-size:.64rem;color:rgba(255,255,255,.32);letter-spacing:1px;margin-top:1px;}
.round-del{background:none;border:none;color:rgba(255,100,100,.5);cursor:pointer;font-size:1rem;padding:2px 6px;border-radius:4px;transition:all .2s;}
.round-del:hover{color:#f87171;background:rgba(255,100,100,.1);}
.add-btn{grid-column:1/-1;padding:9px;border:1px dashed rgba(245,197,24,.3);border-radius:8px;background:rgba(245,197,24,.04);color:rgba(245,197,24,.6);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:.8rem;letter-spacing:2px;text-transform:uppercase;transition:all .2s;}
.add-btn:hover{background:rgba(245,197,24,.1);color:var(--gold);border-color:var(--gold);}
.big-btn{grid-column:1/-1;width:100%;padding:13px;border:none;border-radius:10px;cursor:pointer;font-family:'Oswald',sans-serif;font-size:1.3rem;letter-spacing:3px;background:linear-gradient(135deg,var(--gold2),var(--gold));color:#000;box-shadow:0 4px 20px rgba(245,197,24,.35);transition:all .2s;margin-top:4px;}
.big-btn:hover{box-shadow:0 4px 32px rgba(245,197,24,.6);transform:translateY(-1px);}

/* ── BUZZ TIMER ── */
.buzz-timer-wrap{margin-bottom:10px;}
.buzz-timer-ring{position:relative;width:64px;height:64px;margin:0 auto 6px;}
.buzz-timer-ring svg{transform:rotate(-90deg);}
.buzz-timer-ring circle{fill:none;stroke-width:5;stroke-linecap:round;}
.btr-bg{stroke:rgba(255,255,255,.1);}
.btr-fg{stroke:var(--gold);transition:stroke-dashoffset .9s linear;stroke:var(--gold);}
.btr-fg.urgent{stroke:#f43f5e;}
.buzz-timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:1.5rem;font-weight:700;color:var(--white);}
.buzz-timer-num.urgent{color:#f43f5e;}

/* ── TIME'S UP POPUP ── */
.timeup-popup{
  display:none;position:fixed;inset:0;z-index:80;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,.65);backdrop-filter:blur(4px);
}
.timeup-popup.show{display:flex;}
.timeup-box{
  background:var(--surface);
  border:2px solid #f43f5e;
  border-radius:18px;
  padding:28px 36px;
  text-align:center;
  box-shadow:0 0 40px rgba(244,63,94,.4);
  animation:bannerIn .35s cubic-bezier(.34,1.56,.64,1);
  position:relative;max-width:320px;width:90%;
}
.timeup-x{
  position:absolute;top:10px;right:14px;
  background:none;border:none;color:rgba(255,255,255,.4);
  font-size:1.3rem;cursor:pointer;line-height:1;
  transition:color .15s;
}
.timeup-x:hover{color:var(--white);}
.timeup-emoji{font-size:3rem;margin-bottom:8px;}
.timeup-title{font-family:'Oswald',sans-serif;font-size:2.2rem;letter-spacing:4px;color:#f43f5e;margin-bottom:4px;}
.timeup-sub{font-size:.8rem;color:rgba(255,255,255,.45);letter-spacing:1px;}
#gameView{justify-content:flex-start;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(14,14,32,.9) 0%,transparent 100%);flex-shrink:0;}
.topbar-title{font-family:'Oswald',sans-serif;font-size:1.2rem;letter-spacing:3px;color:var(--gold);}
.topbar-round{font-size:.65rem;letter-spacing:2px;color:rgba(255,255,255,.3);text-transform:uppercase;}
.settings-btn{background:none;border:1px solid var(--border);border-radius:6px;color:rgba(255,255,255,.4);cursor:pointer;padding:5px 10px;font-size:.76rem;transition:all .2s;letter-spacing:1px;font-family:'Barlow Condensed',sans-serif;}
.settings-btn:hover{color:var(--white);border-color:rgba(255,255,255,.3);}

.scores{display:flex;gap:7px;padding:8px 12px;flex-shrink:0;align-items:stretch;justify-content:center;flex-wrap:wrap;}
.score-panel{flex:1;min-width:72px;max-width:160px;border-radius:10px;padding:7px 10px;border:2px solid transparent;transition:all .3s;position:relative;overflow:hidden;}
.score-panel::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;}
.score-panel.active::before{opacity:1;}
.score-panel.buzzing{animation:buzzPulse .35s ease 2;}
@keyframes buzzPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
.centre-meta{display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;padding:0 2px;}
.round-pip-row{display:flex;justify-content:center;gap:4px;margin-bottom:3px;flex-wrap:wrap;max-width:100px;}
.pip{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.12);transition:all .3s;}
.pip.done{background:var(--gold);}
.pip.now{background:var(--gold2);transform:scale(1.5);box-shadow:0 0 5px var(--gold2);}
.rnd-lbl{font-size:.58rem;letter-spacing:2px;color:rgba(255,255,255,.28);text-transform:uppercase;white-space:nowrap;}
.s-badge{font-size:.52rem;letter-spacing:2px;text-transform:uppercase;min-height:12px;color:var(--gold);}
.s-name{font-family:'Oswald',sans-serif;font-size:clamp(.7rem,1.8vw,.95rem);letter-spacing:1px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.s-val{font-family:'Oswald',sans-serif;font-size:clamp(1.4rem,3.5vw,2.4rem);color:var(--white);line-height:1;}

.cat-bar{display:flex;justify-content:center;gap:10px;padding:8px 16px;flex-shrink:0;flex-wrap:wrap;}
.cat-pill{padding:8px 22px;border-radius:999px;font-size:1rem;letter-spacing:3px;text-transform:uppercase;font-weight:600;}
.p-cat{background:rgba(245,197,24,.15);border:2px solid rgba(245,197,24,.5);color:var(--gold);text-shadow:0 0 12px var(--glow);}
.p-lang{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.2);color:rgba(255,255,255,.75);}

.board-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 12px;}
.puzzle-board{display:flex;flex-direction:column;align-items:center;gap:7px;width:100%;}
.prow{display:flex;gap:4px;justify-content:center;flex-wrap:nowrap;}
.tile{width:clamp(24px,4.2vw,54px);height:clamp(32px,5.8vw,70px);background:var(--tile-off);border:2px solid rgba(255,255,255,.1);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:clamp(.82rem,2.5vw,1.85rem);font-weight:700;color:transparent;position:relative;overflow:hidden;transition:border-color .2s;}
.tile.space{background:transparent;border-color:transparent;width:clamp(7px,1.1vw,15px);}
.tile.lit{background:var(--tile-on);border-color:var(--gold);color:#fff;box-shadow:0 0 10px rgba(245,197,24,.22),inset 0 1px 0 rgba(255,255,255,.08);animation:tileFlip .35s cubic-bezier(.34,1.56,.64,1);}
.tile.win{background:linear-gradient(145deg,#15803d,#166534)!important;border-color:#4ade80!important;color:#fff!important;box-shadow:0 0 16px rgba(74,222,128,.5)!important;animation:tilePop .4s ease!important;}
@keyframes tileFlip{0%{transform:rotateY(90deg) scale(.8);opacity:0;}60%{transform:rotateY(-8deg) scale(1.05);}100%{transform:none;opacity:1;}}
@keyframes tilePop{0%{transform:scale(1);}30%{transform:scale(1.18);}70%{transform:scale(.95);}100%{transform:scale(1);}}

.prog-strip{width:min(500px,92%);height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin:7px 0;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:2px;transition:width .5s ease;}
.status-line{font-size:.68rem;letter-spacing:2px;color:rgba(255,255,255,.3);text-transform:uppercase;min-height:16px;text-align:center;margin-bottom:4px;}

.ctrl-bar{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;padding:7px 14px 4px;flex-shrink:0;}
.btn{font-family:'Oswald',sans-serif;font-size:.92rem;letter-spacing:2px;text-transform:uppercase;padding:8px 16px;border:none;border-radius:8px;cursor:pointer;transition:all .2s;}
.btn:active{transform:scale(.96);}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important;}
.btn-gold{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#000;box-shadow:0 3px 14px rgba(245,197,24,.3);}
.btn-gold:hover:not(:disabled){box-shadow:0 3px 24px rgba(245,197,24,.6);transform:translateY(-1px);}
.btn-ghost{background:transparent;color:rgba(255,255,255,.5);border:1px solid var(--border);}
.btn-ghost:hover:not(:disabled){background:rgba(255,255,255,.07);color:var(--white);}
.btn-green{background:linear-gradient(135deg,#15803d,var(--green));color:#fff;box-shadow:0 3px 14px rgba(34,197,94,.3);}
.btn-green:hover:not(:disabled){box-shadow:0 3px 24px rgba(34,197,94,.6);transform:translateY(-1px);}

.judge-panel{display:none;padding:7px 14px 10px;flex-shrink:0;}
.judge-inner{background:var(--surface);border:1px solid rgba(245,197,24,.25);border-radius:14px;padding:13px 16px;text-align:center;animation:bannerIn .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes bannerIn{from{transform:scale(.85) translateY(10px);opacity:0;}to{transform:none;opacity:1;}}
.judge-title{font-family:'Oswald',sans-serif;font-size:clamp(1.1rem,3.5vw,1.8rem);letter-spacing:3px;margin-bottom:3px;}
.judge-sub{font-size:.7rem;color:rgba(255,255,255,.4);letter-spacing:1px;margin-bottom:10px;}
.judge-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}

.buzzer-bar{display:flex;gap:7px;padding:6px 12px 12px;flex-shrink:0;flex-wrap:wrap;}
.buzzer{flex:1;min-width:90px;padding:clamp(11px,2.8vw,18px) 6px;border:none;border-radius:10px;cursor:pointer;font-family:'Oswald',sans-serif;font-size:clamp(.8rem,2.2vw,1.2rem);letter-spacing:2px;text-transform:uppercase;transition:all .15s;}
.buzzer:active{transform:scale(.97);}
.buzzer:disabled{opacity:.35;cursor:not-allowed;transform:none!important;}



.final-screen{display:none;position:fixed;inset:0;z-index:60;background:var(--bg);align-items:center;justify-content:center;flex-direction:column;gap:20px;padding:28px;}
.final-screen.show{display:flex;}
.final-trophy{font-size:clamp(3rem,10vw,6rem);animation:bounce .8s ease infinite alternate;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-14px);}}
.final-winner{font-family:'Oswald',sans-serif;font-size:clamp(1.8rem,6vw,3.8rem);letter-spacing:4px;text-align:center;background:linear-gradient(135deg,#fff,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.final-scores{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
.fs-panel{text-align:center;background:var(--surface);border-radius:12px;padding:12px 22px;border:2px solid var(--border);}
.fs-panel.wp{border-color:var(--gold);box-shadow:0 0 28px var(--glow);}
.fs-name{font-family:'Oswald',sans-serif;font-size:.95rem;letter-spacing:2px;}
.fs-score{font-family:'Oswald',sans-serif;font-size:2.4rem;color:var(--white);}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:70;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(245,197,24,.25);border-radius:2px;}
</style>
</head>
<body>

<!-- ═══ SETUP ═══ -->
<div id="setupView" class="view active">
<div class="setup-card">
  <div class="logo">
    <div class="logo-main">TRIPLE TOSS-UP</div>
    <div class="logo-sub">Host Control · Team Edition</div>
  </div>
  <div class="setup-grid">

    <!-- Number of teams -->
    <div class="field full">
      <label>Number of Teams</label>
      <div class="pill-row">
        <button class="pill-opt on" data-n="2" onclick="pickTeamCount(this)">2</button>
        <button class="pill-opt"    data-n="3" onclick="pickTeamCount(this)">3</button>
        <button class="pill-opt"    data-n="4" onclick="pickTeamCount(this)">4</button>
        <button class="pill-opt"    data-n="5" onclick="pickTeamCount(this)">5</button>
        <button class="pill-opt"    data-n="6" onclick="pickTeamCount(this)">6</button>
      </div>
    </div>

    <!-- Team name inputs (dynamic) -->
    <div id="teamNamesGrid" class="full"></div>

    <!-- Points -->
    <div class="field">
      <label>Points per correct guess</label>
      <select id="pts">
        <option value="100">100</option>
        <option value="250" selected>250</option>
        <option value="500">500</option>
        <option value="1000">1000</option>
      </select>
    </div>

    <!-- Speed -->
    <div class="field">
      <label>Reveal speed (auto mode)</label>
      <select id="spd">
        <option value="3000">Very Slow — 1 every 3 sec</option>
        <option value="2000" selected>Slow — 1 every 2 sec</option>
        <option value="1000">Medium — 1 per sec</option>
        <option value="500">Fast — 2 per sec</option>
      </select>
    </div>

    <div class="sdiv"></div>

    <!-- Round entry -->
    <div class="field full">
      <label>Phrase / Word(s) for this Round</label>
      <input id="rPhrase" type="text" placeholder="e.g.  DILWALE DULHANIA LE JAYENGE" style="text-transform:uppercase;">
    </div>
    <div class="field">
      <label>Category</label>
      <input id="rCat" type="text" value="Bollywood Film" placeholder="e.g. Bollywood Film">
    </div>
    <div class="field">
      <label>Buzz Timer (seconds, 0 = no timer)</label>
      <input id="rTimer" type="number" value="10" min="0" max="60" placeholder="e.g. 10">
    </div>
    <div class="field full">
      <label>Language</label>
      <div class="pill-row">
        <button class="pill-opt on" data-l="English" onclick="pickLang(this)">🇬🇧 English</button>
        <button class="pill-opt"    data-l="Hindi"   onclick="pickLang(this)">🇮🇳 Hindi</button>
        <button class="pill-opt"    data-l="Both"    onclick="pickLang(this)">🌐 Both</button>
      </div>
    </div>

    <button class="add-btn" onclick="addRound()">+ Add Round</button>
    <div class="sdiv"></div>
    <div id="roundsList"></div>
    <div class="sdiv"></div>
    <button class="big-btn" onclick="startGame()">🎬 Start Game</button>
  </div>
</div>
</div>

<!-- ═══ GAME ═══ -->
<div id="gameView" class="view">
  <div class="topbar">
    <div>
      <div class="topbar-title">TRIPLE TOSS-UP</div>
      <div class="topbar-round" id="topRoundLbl">Round 1</div>
    </div>
    <button class="settings-btn" onclick="goSetup()">⚙ Edit</button>
  </div>

  <div class="scores" id="scoresBar"></div>

  <div class="cat-bar">
    <span class="cat-pill p-cat"  id="catPill">—</span>
    <span class="cat-pill p-lang" id="langPill">—</span>
  </div>

  <div class="board-wrap">
    <div class="status-line" id="statusLine">—</div>
    <div class="puzzle-board" id="pboard"></div>
    <div class="prog-strip"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>

  <div class="ctrl-bar">
    <button class="btn btn-ghost" id="btnReveal" onclick="onRevealClick()">Reveal Letter</button>
    <button class="btn btn-gold"  id="btnAuto"   onclick="onAutoClick()">▶ Auto</button>
    <button class="btn btn-ghost" id="btnSkip"   onclick="onSkipClick()">Skip to All</button>
    <button class="btn btn-green" id="btnNext"   onclick="nextRound()" style="display:none">Next Round →</button>
    <button class="btn btn-ghost" id="btnReset"  onclick="resetGame()">↺ Reset</button>
  </div>

  <div class="judge-panel" id="judgePanel">
    <div class="judge-inner">
      <div class="judge-title" id="judgeTitle">🎙 BUZZED IN!</div>
      <div id="buzzTimerWrap" class="buzz-timer-wrap" style="display:none">
        <div class="buzz-timer-ring">
          <svg width="64" height="64" viewBox="0 0 64 64">
            <circle class="btr-bg" cx="32" cy="32" r="28"/>
            <circle class="btr-fg" id="btrFg" cx="32" cy="32" r="28"
              stroke-dasharray="175.93" stroke-dashoffset="0"/>
          </svg>
          <div class="buzz-timer-num" id="btrNum">10</div>
        </div>
      </div>
      <div class="judge-sub" id="judgeSub">Did they get it right?</div>
      <div class="judge-btns">
        <button class="btn btn-green" id="btnCorrect" onclick="markCorrect()">✅ Correct</button>
        <button class="btn btn-ghost"                 onclick="markWrong()">❌ Wrong</button>
        <button class="btn btn-ghost"                 onclick="resumeFromJudge()">↩ No Buzz</button>
      </div>
    </div>
  </div>

  <div class="buzzer-bar" id="buzzerBar"></div>
</div>



<!-- TIME'S UP -->
<div class="timeup-popup" id="timeupPopup">
  <div class="timeup-box">
    <button class="timeup-x" onclick="closeTimeup()">✕</button>
    <div class="timeup-emoji">⏰</div>
    <div class="timeup-title">TIME'S UP!</div>
    <div class="timeup-sub" id="timeupSub">Team's answer is incorrect</div>
  </div>
</div>

<!-- FINAL -->
<div class="final-screen" id="finalScreen">
  <canvas id="confetti"></canvas>
  <div class="final-trophy">🏆</div>
  <div class="final-winner" id="finalWinner">GAME OVER</div>
  <div class="final-scores" id="finalScores"></div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
    <button class="btn btn-gold"  onclick="playAgain()">🔄 Play Again</button>
    <button class="btn btn-ghost" onclick="goSetup()">⚙ Edit Rounds</button>
  </div>
</div>

<script>
// ── TEAM COLOURS ──────────────────────────
const TC=[
  {m:'#3b82f6',d:'#1d4ed8',bg:'rgba(59,130,246,.1)'},
  {m:'#f43f5e',d:'#be123c',bg:'rgba(244,63,94,.1)'},
  {m:'#a78bfa',d:'#6d28d9',bg:'rgba(167,139,250,.1)'},
  {m:'#34d399',d:'#059669',bg:'rgba(52,211,153,.1)'},
  {m:'#fb923c',d:'#c2410c',bg:'rgba(251,146,60,.1)'},
  {m:'#f9a8d4',d:'#be185d',bg:'rgba(249,168,212,.1)'},
];
const DN=['Team Blue','Team Red','Team Purple','Team Green','Team Orange','Team Pink'];

// ── STATE ────────────────────────────────
const G={
  rounds:[],rIdx:0,
  numTeams:2,teamNames:['Team Blue','Team Red'],scores:[0,0],
  pts:250,speed:2000,
  puzzle:'',revealed:[],order:[],oIdx:0,total:0,
  done:false,buzzedBy:-1,autoTimer:null,buzzTimerInterval:null,
};

// ── SETUP ─────────────────────────────────
function pickTeamCount(btn){
  document.querySelectorAll('[data-n]').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  G.numTeams=parseInt(btn.dataset.n);
  buildTeamInputs();
}

function buildTeamInputs(){
  const g=document.getElementById('teamNamesGrid');
  g.innerHTML='';
  for(let i=0;i<G.numTeams;i++){
    const d=document.createElement('div');
    d.className='field';
    const cur=G.teamNames[i]||DN[i];
    d.innerHTML=`<label>Team ${i+1} Name</label><input id="tn${i}" type="text" value="${cur}" maxlength="20" placeholder="${DN[i]}">`;
    g.appendChild(d);
  }
}

function pickLang(btn){
  document.querySelectorAll('[data-l]').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}
function getLang(){return document.querySelector('[data-l].on')?.dataset.l||'English';}

function addRound(){
  const p=document.getElementById('rPhrase').value.trim().toUpperCase();
  if(!p){alert('Please type a phrase!');return;}
  const t=parseInt(document.getElementById('rTimer').value)||0;
  G.rounds.push({phrase:p,cat:document.getElementById('rCat').value.trim()||'General',lang:getLang(),buzzTimer:t});
  document.getElementById('rPhrase').value='';
  renderRoundsList();
}

function renderRoundsList(){
  const el=document.getElementById('roundsList');
  if(!G.rounds.length){el.innerHTML='<div style="text-align:center;color:rgba(255,255,255,.22);font-size:.73rem;letter-spacing:1px;padding:8px 0;">No rounds yet — add one above</div>';return;}
  el.innerHTML=G.rounds.map((r,i)=>`<div class="round-entry"><span class="round-num">${i+1}</span><div class="round-info"><div class="round-phrase">${r.phrase}</div><div class="round-meta">${r.cat} · ${r.lang}${r.buzzTimer>0?' · ⏱ '+r.buzzTimer+'s':''}</div></div><button class="round-del" onclick="delRound(${i})">✕</button></div>`).join('');
}

function delRound(i){G.rounds.splice(i,1);renderRoundsList();}

// ── START ────────────────────────────────
function startGame(){
  if(!G.rounds.length){alert('Add at least one round first!');return;}
  G.numTeams=parseInt(document.querySelector('[data-n].on')?.dataset.n||2);
  G.teamNames=[];G.scores=[];
  for(let i=0;i<G.numTeams;i++){
    G.teamNames.push(document.getElementById('tn'+i)?.value.trim()||DN[i]);
    G.scores.push(0);
  }
  G.pts=parseInt(document.getElementById('pts').value);
  G.speed=parseInt(document.getElementById('spd').value);
  G.rIdx=0;
  buildScoreBar();buildBuzzerBar();
  switchView('gameView');buildPips();loadRound();
}

function goSetup(){
  stopAuto();buildTeamInputs();renderRoundsList();switchView('setupView');
}

function switchView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── SCORE BAR ────────────────────────────
function buildScoreBar(){
  const bar=document.getElementById('scoresBar');
  bar.innerHTML='';
  const left=Math.ceil(G.numTeams/2);
  for(let i=0;i<left;i++) bar.appendChild(mkPanel(i));
  const cm=document.createElement('div');
  cm.className='centre-meta';
  cm.innerHTML='<div class="round-pip-row" id="pipRow"></div><div class="rnd-lbl" id="rndLbl">—</div>';
  bar.appendChild(cm);
  for(let i=left;i<G.numTeams;i++) bar.appendChild(mkPanel(i));
}

function mkPanel(i){
  const c=TC[i];
  const d=document.createElement('div');
  d.className='score-panel';d.id='sp'+i;
  d.style.borderColor=c.m;
  // inject ::before colour via inline style trick using a wrapper
  d.setAttribute('style',`border-color:${c.m};--pbg:${c.bg};`);
  d.innerHTML=`<div class="s-badge" id="b${i}"></div><div class="s-name" id="sn${i}" style="color:${c.m}">${G.teamNames[i]}</div><div class="s-val" id="sv${i}">0</div>`;
  return d;
}

// inject dynamic ::before for each panel via a style tag
function injectPanelStyles(){
  let s=document.getElementById('dynStyles');
  if(!s){s=document.createElement('style');s.id='dynStyles';document.head.appendChild(s);}
  s.textContent=TC.map((c,i)=>`#sp${i}::before{background:${c.bg};}`).join('');
}

function buildBuzzerBar(){
  const bar=document.getElementById('buzzerBar');bar.innerHTML='';
  for(let i=0;i<G.numTeams;i++){
    const c=TC[i];
    const btn=document.createElement('button');
    btn.className='buzzer';btn.id='buz'+i;
    btn.style.cssText=`background:linear-gradient(145deg,${c.d},${c.m});color:#fff;box-shadow:0 5px 18px ${c.bg};`;
    btn.innerHTML=`🔔 <span id="buzname${i}">${G.teamNames[i]}</span>`;
    btn.onclick=()=>buzz(i);
    bar.appendChild(btn);
  }
}

// ── PIPS ─────────────────────────────────
function buildPips(){
  const r=document.getElementById('pipRow');if(!r)return;
  r.innerHTML=G.rounds.map((_,i)=>`<div class="pip" id="pip${i}"></div>`).join('');
}
function updatePips(){
  G.rounds.forEach((_,i)=>{const p=document.getElementById('pip'+i);if(p)p.className='pip'+(i<G.rIdx?' done':i===G.rIdx?' now':'');});
  const t=`Round ${G.rIdx+1} / ${G.rounds.length}`;
  const rl=document.getElementById('rndLbl');if(rl)rl.textContent=t;
  document.getElementById('topRoundLbl').textContent=t;
}

// ── LOAD ROUND ───────────────────────────
function loadRound(){
  stopAuto();
  stopBuzzTimer();
  document.getElementById('timeupPopup').classList.remove('show');
  const r=G.rounds[G.rIdx];
  G.puzzle=r.phrase;
  G.revealed=r.phrase.split('').map(c=>c===' ');
  G.order=shuffle(r.phrase);
  G.oIdx=0;G.total=r.phrase.split('').filter(c=>c!==' ').length;
  G.done=false;G.buzzedBy=-1;
  document.getElementById('catPill').textContent=r.cat;
  document.getElementById('langPill').textContent=r.lang;
  document.getElementById('progFill').style.width='0%';
  document.getElementById('judgePanel').style.display='none';
  document.getElementById('btnNext').style.display='none';
  document.getElementById('btnAuto').textContent='▶ Auto';
  document.getElementById('btnAuto').disabled=false;
  document.getElementById('btnReveal').disabled=false;
  document.getElementById('btnSkip').disabled=false;
  for(let i=0;i<G.numTeams;i++){
    const b=document.getElementById('buz'+i);if(b)b.disabled=false;
    const sp=document.getElementById('sp'+i);if(sp)sp.classList.remove('buzzing','active');
    setBadge(i,'');
  }
  updatePips();updateScores();renderBoard();
  setStatus('Letters reveal one by one — buzz in when you know!');
}

function shuffle(s){
  const a=[];for(let i=0;i<s.length;i++)if(s[i]!==' ')a.push(i);
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ── BOARD ────────────────────────────────
function renderBoard(){
  const board=document.getElementById('pboard');
  const words=G.puzzle.split(' ');
  board.innerHTML='';let ci=0;
  words.forEach((w,wi)=>{
    const row=document.createElement('div');row.className='prow';
    w.split('').forEach(ch=>{
      const gi=ci+wi;const t=document.createElement('div');
      t.className='tile';t.id='tile'+gi;
      if(G.revealed[gi]){t.textContent=ch;t.classList.add('lit');}
      row.appendChild(t);ci++;
    });
    if(wi<words.length-1){const sp=document.createElement('div');sp.className='tile space';row.appendChild(sp);}
    board.appendChild(row);
  });
}

function litTile(pos,win=false){
  G.revealed[pos]=true;
  const t=document.getElementById('tile'+pos);if(!t)return;
  t.textContent=G.puzzle[pos];
  if(win){t.classList.remove('lit');t.classList.add('win');}else t.classList.add('lit');
}

function updateProgress(){
  const n=G.revealed.filter((v,i)=>v&&G.puzzle[i]!==' ').length;
  document.getElementById('progFill').style.width=(n/G.total*100)+'%';
}

// ── REVEAL ───────────────────────────────
// Auto is a self-contained mode. Manual buttons always kill auto first.

function stopAuto(){
  // Hard-stop the interval and reset auto button state
  if(G.autoTimer){clearInterval(G.autoTimer);G.autoTimer=null;}
  const btn=document.getElementById('btnAuto');
  if(btn){btn.textContent='▶ Auto';btn.classList.remove('btn-active');}
}

function onRevealClick(){
  // Manual reveal — always stops auto first
  stopAuto();
  if(G.done)return;
  if(G.oIdx>=G.order.length){setStatus('All letters revealed!');return;}
  litTile(G.order[G.oIdx++]);
  updateProgress();
  const left=G.order.length-G.oIdx;
  setStatus(left>0?`${left} letter${left>1?'s':''} still hidden — buzz when ready!`:'All letters revealed!');
}

function onAutoClick(){
  // Toggle auto on/off
  if(G.autoTimer){
    // Currently running — stop it
    stopAuto();
  } else {
    // Start auto
    if(G.done)return;
    if(G.oIdx>=G.order.length){setStatus('All letters revealed!');return;}
    document.getElementById('btnAuto').textContent='⏹ Stop Auto';
    G.autoTimer=setInterval(()=>{
      // Auto never runs while buzzed/paused
      if(G.buzzedBy!==-1)return;
      if(G.done||G.oIdx>=G.order.length){
        stopAuto();
        setStatus('All letters revealed!');
        return;
      }
      litTile(G.order[G.oIdx++]);
      updateProgress();
      const left=G.order.length-G.oIdx;
      setStatus(left>0?`${left} letter${left>1?'s':''} still hidden — buzz when ready!`:'All letters revealed!');
    },G.speed);
  }
}

function onSkipClick(){
  // Skip — always stops auto first
  stopAuto();
  if(G.done)return;
  while(G.oIdx<G.order.length) litTile(G.order[G.oIdx++]);
  updateProgress();
  setStatus('All letters revealed!');
}

// ── BUZZ TIMER HELPERS ───────────────────
const CIRC = 175.93; // 2π × 28

function stopBuzzTimer(){
  if(G.buzzTimerInterval){clearInterval(G.buzzTimerInterval);G.buzzTimerInterval=null;}
  document.getElementById('buzzTimerWrap').style.display='none';
}

function startBuzzTimer(secs){
  const wrap=document.getElementById('buzzTimerWrap');
  const ring=document.getElementById('btrFg');
  const num=document.getElementById('btrNum');
  wrap.style.display='block';
  num.classList.remove('urgent');
  ring.classList.remove('urgent');

  let remaining=secs;
  // init ring full
  ring.style.strokeDashoffset='0';
  num.textContent=remaining;

  G.buzzTimerInterval=setInterval(()=>{
    remaining--;
    const offset=CIRC*(1-(remaining/secs));
    ring.style.strokeDashoffset=offset;
    num.textContent=remaining;
    if(remaining<=3){ring.classList.add('urgent');num.classList.add('urgent');}
    if(remaining<=0){
      stopBuzzTimer();
      triggerTimeup();
    }
  },1000);
}

function triggerTimeup(){
  const i=G.buzzedBy;
  // Hide judge panel
  document.getElementById('judgePanel').style.display='none';
  // Mark badge
  setBadge(i,'⏰ Time Up');
  document.getElementById('sp'+i)?.classList.remove('buzzing','active');
  // Show TIME'S UP popup
  document.getElementById('timeupSub').textContent=
    `${G.teamNames[i]}'s time ran out — marked incorrect`;
  document.getElementById('timeupPopup').classList.add('show');
  // Apply wrong logic (without closing popup yet — closeTimeup does that)
  _applyWrong(i);
}

function closeTimeup(){
  document.getElementById('timeupPopup').classList.remove('show');
}

// ── BUZZ ─────────────────────────────────
function buzz(i){
  if(G.done)return;
  stopAuto();
  stopBuzzTimer();
  G.buzzedBy=i;
  for(let j=0;j<G.numTeams;j++){const b=document.getElementById('buz'+j);if(b)b.disabled=true;}
  document.getElementById('judgeTitle').innerHTML=`<span style="color:${TC[i].m}">🔔 ${G.teamNames[i]}</span>`;
  document.getElementById('judgeSub').textContent='Did they get it right?';
  document.getElementById('btnCorrect').textContent=`✅ Yes — Correct (+${G.pts})`;
  document.getElementById('judgePanel').style.display='block';
  document.getElementById('sp'+i)?.classList.add('buzzing','active');
  setStatus(`${G.teamNames[i]} buzzed in!`);
  // Start countdown if this round has a timer
  const secs=G.rounds[G.rIdx]?.buzzTimer||0;
  if(secs>0) startBuzzTimer(secs);
}

function markCorrect(){
  stopBuzzTimer();
  const i=G.buzzedBy;
  G.scores[i]+=G.pts;
  updateScores();
  stopAuto();
  G.puzzle.split('').forEach((_,p)=>{if(G.puzzle[p]!==' ')litTile(p,true);});
  updateProgress();
  setBadge(i,`+${G.pts} ✓`);
  document.getElementById('judgePanel').style.display='none';
  for(let j=0;j<G.numTeams;j++){
    document.getElementById('sp'+j)?.classList.remove('buzzing','active');
    const b=document.getElementById('buz'+j);if(b)b.disabled=true;
  }
  document.getElementById('btnNext').style.display='inline-block';
  document.getElementById('btnNext').textContent=G.rIdx+1<G.rounds.length?'Next Round →':'🏆 Final Score';
  document.getElementById('btnAuto').disabled=true;
  document.getElementById('btnReveal').disabled=true;
  document.getElementById('btnSkip').disabled=true;
  G.done=true;
  G.buzzedBy=-1;
  setStatus(`${G.teamNames[i]} guessed it! 🎉`);
  launchConfetti(200);
}

// Shared wrong logic (used by markWrong button AND timer expiry)
function _applyWrong(i){
  document.getElementById('sp'+i)?.classList.remove('buzzing','active');
  // Re-enable every team except the one who got it wrong
  for(let j=0;j<G.numTeams;j++){
    if(j!==i){const b=document.getElementById('buz'+j);if(b)b.disabled=false;}
  }
  G.buzzedBy=-1;
  setStatus('Wrong! Other teams may buzz in… or press ▶ Auto to continue.');
}

function markWrong(){
  stopBuzzTimer();
  const i=G.buzzedBy;
  setBadge(i,'✗ Wrong');
  document.getElementById('judgePanel').style.display='none';
  _applyWrong(i);
}

function resumeFromJudge(){
  stopBuzzTimer();
  document.getElementById('judgePanel').style.display='none';
  for(let i=0;i<G.numTeams;i++){
    document.getElementById('sp'+i)?.classList.remove('buzzing','active');
    const b=document.getElementById('buz'+i);if(b)b.disabled=false;
  }
  G.buzzedBy=-1;
  setStatus('Resumed — keep going!');
}

// Removed: toggleAuto, startAuto, clearAuto, skipReveal, togglePause (replaced above)
function clearAuto(){stopAuto();} // alias for loadRound / goSetup calls

// ── NEXT / FINAL ─────────────────────────
function nextRound(){G.rIdx++;if(G.rIdx>=G.rounds.length){showFinal();return;}loadRound();}

function showFinal(){
  stopAuto();
  const max=Math.max(...G.scores);
  const w=G.teamNames.filter((_,i)=>G.scores[i]===max);
  document.getElementById('finalWinner').textContent=w.length===1?`🏆 ${w[0]} WINS!`:"🤝 IT'S A TIE!";
  document.getElementById('finalScores').innerHTML=G.teamNames.map((n,i)=>`<div class="fs-panel${G.scores[i]===max&&max>0?' wp':''}"><div class="fs-name" style="color:${TC[i].m}">${n}</div><div class="fs-score">${G.scores[i].toLocaleString()}</div></div>`).join('');
  document.getElementById('finalScreen').classList.add('show');
  if(w.length===1)launchConfetti(350);
}

function playAgain(){
  document.getElementById('finalScreen').classList.remove('show');
  G.scores=G.scores.map(()=>0);G.rIdx=0;
  updateScores();buildPips();loadRound();
}

// ── RESET ────────────────────────────────
function resetGame(){
  stopAuto();
  stopBuzzTimer();
  document.getElementById('timeupPopup').classList.remove('show');
  G.scores=G.scores.map(()=>0);
  G.rIdx=0;
  document.getElementById('finalScreen').classList.remove('show');
  buildScoreBar();buildBuzzerBar();buildPips();loadRound();
}

// ── HELPERS ──────────────────────────────
function updateScores(){for(let i=0;i<G.numTeams;i++){const e=document.getElementById('sv'+i);if(e)e.textContent=G.scores[i].toLocaleString();}}
function setStatus(m){document.getElementById('statusLine').textContent=m;}
function setBadge(i,m){const e=document.getElementById('b'+i);if(e)e.textContent=m;}

// ── CONFETTI ─────────────────────────────
function launchConfetti(n){
  const cv=document.getElementById('confetti');const cx=cv.getContext('2d');
  cv.width=innerWidth;cv.height=innerHeight;
  const cols=['#f5c518','#e8961a','#3b82f6','#f43f5e','#22c55e','#a78bfa','#fff'];
  const ps=Array.from({length:n},()=>({x:Math.random()*cv.width,y:-20,w:Math.random()*10+4,h:Math.random()*6+3,c:cols[0|Math.random()*cols.length],vx:(Math.random()-.5)*5,vy:Math.random()*5+2,rot:Math.random()*360,rv:(Math.random()-.5)*10,life:1}));
  function draw(){cx.clearRect(0,0,cv.width,cv.height);let alive=false;ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.rv;p.vy+=.1;p.life-=.006;if(p.y<cv.height&&p.life>0){alive=true;cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot*Math.PI/180);cx.globalAlpha=p.life;cx.fillStyle=p.c;cx.fillRect(-p.w/2,-p.h/2,p.w,p.h);cx.restore();}});if(alive)requestAnimationFrame(draw);else cx.clearRect(0,0,cv.width,cv.height);}
  requestAnimationFrame(draw);
}

// ── KEYBOARD ─────────────────────────────
document.addEventListener('keydown',e=>{
  if(!document.getElementById('gameView').classList.contains('active'))return;
  // Space/arrow = manual reveal (also stops auto)
  if(e.key===' '||e.key==='ArrowRight'){e.preventDefault();onRevealClick();}
  // Number keys = buzz team
  const n=parseInt(e.key);if(n>=1&&n<=G.numTeams)buzz(n-1);
});

// ── INIT ─────────────────────────────────
injectPanelStyles();
buildTeamInputs();
renderRoundsList();
</script>
</body>
</html>
